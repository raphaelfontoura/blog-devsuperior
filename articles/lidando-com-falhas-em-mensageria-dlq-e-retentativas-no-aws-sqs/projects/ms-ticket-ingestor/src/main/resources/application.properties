server.port=8081
spring.application.name=ms-ticket-ingestor

# Fila de destino. O nome ja considera a topologia local do LocalStack.
app.queue.reservation=${RESERVATION_QUEUE_NAME:reservation-queue.fifo}

# ============================================================================
# Endpoint do LocalStack e credenciais fake. Em AWS real a config aqui sai
# (region vem da Task Role no ECS), so existe para apontar o SDK pra
# http://localhost:4566 durante o desenvolvimento.
# ============================================================================
spring.cloud.aws.endpoint=${AWS_ENDPOINT_URL:http://localhost:4566}
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Padrao de log com MDC do correlation-id
logging.pattern.level=%5p [%X{correlationId:-}]
