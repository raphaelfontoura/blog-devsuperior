services:
  db:
    image: pgvector/pgvector:pg18
    container_name: hr-assistant-db
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: hr-assistant-redis
    ports:
      - "6379:6379"   # porta do Redis
      - "8001:8001"   # RedisInsight (UI web)
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: hr-assistant-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    # sobe o servidor, espera ficar pronto, garante o bge-m3 e segue servindo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull bge-m3
        wait $$pid
    healthcheck:
      # so fica saudavel quando o modelo ja esta disponivel (evita race no ingest)
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q bge-m3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
  redisdata:
  ollama: