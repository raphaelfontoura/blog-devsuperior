server.port=8082
spring.application.name=ms-reservation-handler

# Fila de origem e topico de destino
app.queue.reservation=${RESERVATION_QUEUE_NAME:reservation-queue.fifo}
app.topic.ticket-events=${TICKET_EVENTS_TOPIC:ticket-events.fifo}

# ============================================================================
# Endpoint do LocalStack
# ============================================================================
spring.cloud.aws.endpoint=${AWS_ENDPOINT_URL:http://localhost:4566}
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}

# ============================================================================
# SQS Listener
# ============================================================================
spring.cloud.aws.sqs.listener.max-messages-per-poll=10
spring.cloud.aws.sqs.listener.poll-timeout=20s
spring.cloud.aws.sqs.listener.max-concurrent-messages=10

# ============================================================================
# H2 in memory
# ============================================================================
spring.datasource.url=jdbc:h2:mem:reservationdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Padrao de log
logging.pattern.level=%5p [%X{correlationId:-}]
